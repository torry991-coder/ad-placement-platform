version: "3.9"

services:
  # ─── PostgreSQL (recommended for production-grade operation) ────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adplatform
      POSTGRES_PASSWORD: adplatform
      POSTGRES_DB: ad_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adplatform"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ─── Redis (real-time bidding cache + distributed rate limiter) ─────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  # ─── MinIO (creative asset storage, S3-compatible) ─────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ─── Backend API (Gunicorn + Uvicorn, 17 workers × 4 threads) ──────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://adplatform:adplatform@postgres:5432/ad_platform
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=8000
      - WEB_CONCURRENCY=17
      - WORKER_THREADS=4
      - RATE_LIMIT_MAX_REQUESTS=10000
      - DB_POOL_SIZE=50
      - DB_MAX_OVERFLOW=100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ─── NGINX reverse proxy (load balancing + SSL termination) ────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  pgdata:
  miniodata:
