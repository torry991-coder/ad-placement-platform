# =============================================================================
# NGINX Reverse Proxy — 100K concurrent users
# Place at: /etc/nginx/conf.d/ad-platform.conf
# =============================================================================

upstream ad_platform_backend {
    # Least connections algorithm for even worker distribution
    least_conn;
    # Gunicorn workers (17 workers on port 8000)
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    # Keepalive connections to backend (reduces handshake overhead)
    keepalive 128;
}

# ── Rate limiting zones ──────────────────────────────────────────────────────
# Global rate limit: 10000 req/min per IP
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=10000r/m;

# Burst capacity for auction endpoint
limit_req_zone $binary_remote_addr zone=auction_limit:10m rate=1000r/s;

# Connection limiting per IP (DDoS protection)
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
    listen 80 default_server backlog=4096;
    server_name _;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_per_ip 100;
    limit_req zone=global_limit burst=2000 nodelay;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # ── Buffer settings ───────────────────────────────────────────────────────
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 32k;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_vary on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Health check endpoint (no rate limiting) ──────────────────────────────
    location /api/health {
        limit_req zone=global_limit burst=5000 nodelay;
        proxy_pass http://ad_platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://ad_platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffering for large responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 32 16k;
        proxy_busy_buffers_size 32k;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Auction endpoint (high throughput, relaxed rate limit) ─────────────────
    location /api/bidding/auction {
        limit_req zone=auction_limit burst=2000 nodelay;
        proxy_pass http://ad_platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # No buffering for real-time bidding
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── SSE streaming endpoint ────────────────────────────────────────────────
    location /api/agent/stream {
        proxy_pass http://ad_platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── API documentation ─────────────────────────────────────────────────────
    location /api/docs {
        proxy_pass http://ad_platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/redoc {
        proxy_pass http://ad_platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/openapi.json {
        proxy_pass http://ad_platform_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Static files (frontend build) ─────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny access to hidden files ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
